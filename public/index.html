<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mycelium — Memory Layer for TinyFish</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:           #060908;
      --bg-panel:     #0b100c;
      --bg-hover:     #0f160f;
      --bg-active:    #0d1a0d;
      --border:       #192619;
      --border-hi:    #2a402a;
      --accent:       #3dff6e;
      --accent-glow:  rgba(61,255,110,0.18);
      --accent-dim:   rgba(61,255,110,0.07);
      --accent-soft:  rgba(61,255,110,0.12);
      --text:         #cfe8d4;
      --text-muted:   #587a61;
      --text-dim:     #2e4a35;
      --ok:           #3dff6e;
      --fail:         #ff4f4f;
      --warn:         #ffd03d;
      --info:         #40c8f4;
      --font:         'JetBrains Mono', monospace;

      --c-flow:       #3dff6e;
      --c-blocker:    #ff4f4f;
      --c-timing:     #ffd03d;
      --c-selector:   #40c8f4;
      --c-failure:    #ff6b9d;
      --c-auth:       #b39ddb;
      --c-rate_limit: #ffab40;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      overflow: hidden;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(6,9,8,0.8) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,16,12,0.9);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
    }

    .logo-tag {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .mock-badge {
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid var(--warn);
      color: var(--warn);
      letter-spacing: 0.06em;
      display: none;
    }

    .mock-badge.visible { display: block; }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    .dot.running {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Main layout ────────────────────────────────────────────── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr;
      overflow: hidden;
    }

    /* ── Left panel ─────────────────────────────────────────────── */
    .left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(11,16,12,0.6);
    }

    .run-form {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 13px;
    }

    .field { margin-bottom: 10px; }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    input[type=text], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      caret-color: var(--accent);
    }

    input[type=text]:focus, textarea:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    textarea {
      resize: vertical;
      min-height: 64px;
      line-height: 1.55;
    }

    .run-btn {
      width: 100%;
      margin-top: 2px;
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .run-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .run-btn:hover:not(:disabled)::before { opacity: 1; }
    .run-btn:hover:not(:disabled) { box-shadow: 0 0 16px var(--accent-glow); }

    .run-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Output terminal */
    .output-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 16px 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-size: 11.5px;
      line-height: 1.7;
    }

    .line {
      display: flex;
      gap: 9px;
      padding: 1px 0;
      animation: slideIn 0.18s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .line-icon { flex-shrink: 0; width: 13px; text-align: center; }
    .line-text { word-break: break-word; white-space: pre-wrap; }

    .line.hint    { color: var(--accent); }
    .line.step    { color: var(--text-muted); }
    .line.ok      { color: var(--ok); }
    .line.fail    { color: var(--fail); }
    .line.record  { color: var(--warn); }
    .line.divider { color: var(--text-dim); }
    .line.data    { color: var(--text); opacity: 0.75; }
    .line.meta    { color: var(--text-dim); font-size: 10.5px; }

    .empty-output {
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
      text-align: center;
      padding: 28px 0;
    }

    /* ── Right panel ────────────────────────────────────────────── */
    .right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Domains shelf */
    .domains-shelf {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(11,16,12,0.4);
    }

    .domains-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .domain-card {
      border: 1px solid var(--border);
      padding: 11px 13px;
      cursor: pointer;
      min-width: 130px;
      max-width: 200px;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }

    .domain-card:hover {
      border-color: var(--border-hi);
      background: var(--bg-hover);
    }

    .domain-card.active {
      border-color: var(--accent);
      background: var(--bg-active);
    }

    .dc-hint-count {
      position: absolute;
      top: 7px; right: 8px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .dc-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
      padding-right: 28px;
    }

    .dc-stats {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .dc-bar {
      height: 2px;
      background: var(--border);
      margin-top: 7px;
      overflow: hidden;
    }

    .dc-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .domains-empty {
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
      margin-top: 10px;
    }

    /* Detail panel */
    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .no-sel {
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
      text-align: center;
      margin-top: 48px;
    }

    /* Detail header */
    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .detail-domain-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .detail-meta { font-size: 10.5px; color: var(--text-muted); }

    .clear-btn {
      padding: 5px 11px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .clear-btn:hover {
      border-color: var(--fail);
      color: var(--fail);
    }

    /* Sub-sections */
    .sub {
      margin-bottom: 22px;
    }

    .sub-head {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* Hints */
    .hint-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .hint-item:last-child { border-bottom: none; }

    .hint-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .type-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border: 1px solid;
      flex-shrink: 0;
    }

    .hint-conf {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      white-space: nowrap;
    }

    .conf-bar {
      height: 2px;
      background: var(--border);
      margin-bottom: 6px;
    }

    .conf-fill { height: 100%; transition: width 0.5s ease; }

    .hint-note  { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
    .hint-action { font-size: 11px; color: var(--text); line-height: 1.5; margin-top: 3px; }
    .hint-meta  { font-size: 9.5px; color: var(--text-dim); margin-top: 4px; }

    /* History */
    .hist-item {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      gap: 9px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      align-items: start;
    }
    .hist-item:last-child { border-bottom: none; }

    .hist-icon { font-size: 11px; padding-top: 1px; }
    .hist-goal { color: var(--text); line-height: 1.45; word-break: break-word; }
    .hist-sub  { font-size: 9.5px; color: var(--text-dim); margin-top: 2px; }
    .hist-dur  { font-size: 10px; color: var(--text-dim); white-space: nowrap; }

    /* ── Scrollbars ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ── Type colours ───────────────────────────────────────────── */
    .t-flow       { color: var(--c-flow);       border-color: var(--c-flow);       }
    .t-blocker    { color: var(--c-blocker);    border-color: var(--c-blocker);    }
    .t-timing     { color: var(--c-timing);     border-color: var(--c-timing);     }
    .t-selector   { color: var(--c-selector);   border-color: var(--c-selector);   }
    .t-failure    { color: var(--c-failure);    border-color: var(--c-failure);    }
    .t-auth       { color: var(--c-auth);       border-color: var(--c-auth);       }
    .t-rate_limit { color: var(--c-rate_limit); border-color: var(--c-rate_limit); }

    .f-flow       { background: var(--c-flow);       }
    .f-blocker    { background: var(--c-blocker);    }
    .f-timing     { background: var(--c-timing);     }
    .f-selector   { background: var(--c-selector);   }
    .f-failure    { background: var(--c-failure);    }
    .f-auth       { background: var(--c-auth);       }
    .f-rate_limit { background: var(--c-rate_limit); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <span class="logo-name">🌱 MYCELIUM</span>
      <span class="logo-tag">/ memory layer for TinyFish agents</span>
    </div>
    <div class="header-right">
      <span class="mock-badge" id="mock-badge">MOCK MODE</span>
      <div class="status">
        <div class="dot" id="dot"></div>
        <span id="status-txt">idle</span>
      </div>
    </div>
  </header>

  <!-- ── Layout ─────────────────────────────────────────────── -->
  <div class="layout">

    <!-- Left panel -->
    <div class="left">
      <div class="run-form">
        <div class="panel-label">Run Agent</div>

        <div class="field">
          <label class="field-label" for="inp-url">URL</label>
          <input type="text" id="inp-url" placeholder="reddit.com" autocomplete="off" spellcheck="false" />
        </div>

        <div class="field">
          <label class="field-label" for="inp-goal">Goal</label>
          <textarea id="inp-goal" placeholder="What are the top posts in r/MachineLearning this week?" rows="3"></textarea>
        </div>

        <button class="run-btn" id="run-btn" onclick="runAgent()">▶&nbsp;&nbsp;RUN</button>
      </div>

      <div class="output-wrap">
        <div class="output-label">Output</div>
        <div class="output" id="output">
          <div class="empty-output">run an agent to see live output here</div>
        </div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="right">
      <div class="domains-shelf">
        <div class="panel-label">Knowledge Store</div>
        <div class="domains-scroll" id="domains-grid">
          <div class="domains-empty">loading…</div>
        </div>
      </div>

      <div class="detail" id="detail">
        <div class="no-sel">← select a domain to inspect its memory</div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── State ──────────────────────────────────────────────────────────── */
let selected = null
let running  = false
let domainMap = {}   // domain → DomainStore

/* ── Boot ───────────────────────────────────────────────────────────── */
loadDomains()

document.getElementById('inp-goal').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runAgent()
})

/* ── Data loading ───────────────────────────────────────────────────── */
async function loadDomains() {
  try {
    const res  = await fetch('/api/domains')
    const list = await res.json()
    domainMap  = {}
    list.forEach(d => { domainMap[d.domain] = d })
    renderGrid()
    if (selected && domainMap[selected]) renderDetail(selected)
  } catch {
    document.getElementById('domains-grid').innerHTML =
      '<div class="domains-empty">could not reach server</div>'
  }
}

/* ── Grid ────────────────────────────────────────────────────────────── */
function renderGrid() {
  const grid    = document.getElementById('domains-grid')
  const domains = Object.values(domainMap)

  if (!domains.length) {
    grid.innerHTML = '<div class="domains-empty">no domains tracked yet — run an agent to build memory</div>'
    return
  }

  grid.innerHTML = domains.map(d => `
    <div class="domain-card ${selected === d.domain ? 'active' : ''}"
         onclick="selectDomain('${esc(d.domain)}')">
      <div class="dc-hint-count">${d.hints.length} hint${d.hints.length !== 1 ? 's' : ''}</div>
      <div class="dc-name">${esc(d.domain)}</div>
      <div class="dc-stats">
        <span>${d.runs} run${d.runs !== 1 ? 's' : ''}</span>
        <span>${Math.round(d.successRate * 100)}% success</span>
      </div>
      <div class="dc-bar">
        <div class="dc-bar-fill" style="width:${d.successRate * 100}%"></div>
      </div>
    </div>
  `).join('')
}

/* ── Domain selection ────────────────────────────────────────────────── */
function selectDomain(domain) {
  selected = domain
  renderGrid()
  renderDetail(domain)
}

/* ── Detail view ─────────────────────────────────────────────────────── */
function renderDetail(domain) {
  const d = domainMap[domain]
  if (!d) return

  const panel  = document.getElementById('detail')
  const lastRun = d.history[d.history.length - 1]
  const ago     = lastRun ? timeAgo(lastRun.ts) : 'never'

  panel.innerHTML = `
    <div class="detail-head">
      <div>
        <div class="detail-domain-name">${esc(d.domain)}</div>
        <div class="detail-meta">
          ${d.runs} run${d.runs !== 1 ? 's' : ''} &nbsp;·&nbsp;
          ${Math.round(d.successRate * 100)}% success &nbsp;·&nbsp;
          last run ${ago}
        </div>
      </div>
      <button class="clear-btn" onclick="clearDomain('${esc(d.domain)}')">clear</button>
    </div>

    <div class="sub">
      <div class="sub-head">Hints &nbsp;(${d.hints.length})</div>
      ${d.hints.length === 0
        ? '<div style="color:var(--text-dim);font-size:11px;font-style:italic">no hints extracted yet</div>'
        : d.hints.map(h => `
          <div class="hint-item">
            <div class="hint-top">
              <span class="type-badge t-${h.type}">${h.type}</span>
              <span class="hint-conf">${h.confidence.toFixed(2)} confidence &nbsp;·&nbsp; seen ${h.seen}×</span>
            </div>
            <div class="conf-bar">
              <div class="conf-fill f-${h.type}" style="width:${h.confidence * 100}%"></div>
            </div>
            <div class="hint-note">${esc(h.note)}</div>
            <div class="hint-action">→ ${esc(h.action)}</div>
            <div class="hint-meta">last confirmed: ${h.last} &nbsp;·&nbsp; id: ${h.id}</div>
          </div>
        `).join('')
      }
    </div>

    <div class="sub">
      <div class="sub-head">Run History &nbsp;(${d.history.length})</div>
      ${d.history.length === 0
        ? '<div style="color:var(--text-dim);font-size:11px;font-style:italic">no runs yet</div>'
        : [...d.history].reverse().map(h => `
          <div class="hist-item">
            <div class="hist-icon" style="color:${h.success ? 'var(--ok)' : 'var(--fail)'}">
              ${h.success ? '✓' : '✗'}
            </div>
            <div>
              <div class="hist-goal">${esc(h.goal)}</div>
              <div class="hist-sub">
                ${timeAgo(h.ts)} &nbsp;·&nbsp;
                ${h.hintsUsed} hints used &nbsp;·&nbsp;
                ${h.hintsAdded} added
              </div>
            </div>
            <div class="hist-dur">${h.durationMs ? Math.round(h.durationMs / 1000) + 's' : ''}</div>
          </div>
        `).join('')
      }
    </div>
  `
}

/* ── Clear domain ────────────────────────────────────────────────────── */
async function clearDomain(domain) {
  if (!confirm(`Wipe all memory for ${domain}?`)) return
  await fetch(`/api/domain/${domain}`, { method: 'DELETE' })
  delete domainMap[domain]
  if (selected === domain) {
    selected = null
    document.getElementById('detail').innerHTML =
      '<div class="no-sel">domain cleared</div>'
  }
  renderGrid()
}

/* ── Run ─────────────────────────────────────────────────────────────── */
async function runAgent() {
  if (running) return

  const url  = document.getElementById('inp-url').value.trim()
  const goal = document.getElementById('inp-goal').value.trim()

  if (!url || !goal) {
    addLine('fail', '✗', 'enter a URL and goal first')
    return
  }

  running = true
  setUI(true)
  clearOutput()

  addLine('divider', '·', url)
  addLine('divider', '·', `"${goal}"`)
  addLine('divider', '·', '─'.repeat(44))

  try {
    const res = await fetch('/api/run', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ url, goal }),
    })

    const reader  = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break

      buffer += decoder.decode(value, { stream: true })

      // Split on double newline (SSE message boundary)
      const msgs = buffer.split('\n\n')
      buffer = msgs.pop()  // keep incomplete tail

      for (const msg of msgs) {
        if (!msg.trim()) continue
        let evtName = 'message'
        let evtData = null

        for (const ln of msg.split('\n')) {
          if (ln.startsWith('event: ')) evtName = ln.slice(7).trim()
          if (ln.startsWith('data: ')) {
            try { evtData = JSON.parse(ln.slice(6)) } catch {}
          }
        }

        if (!evtData) continue
        handleEvent(evtName, evtData)
      }
    }
  } catch (err) {
    addLine('fail', '✗', err.message)
  }

  running = false
  setUI(false)
  setTimeout(loadDomains, 400)   // refresh domain cards
}

function handleEvent(name, data) {
  switch (name) {
    case 'primed':
      if (data.hintsLoaded > 0) {
        addLine('hint', '✦', `${data.hintsLoaded} hint${data.hintsLoaded !== 1 ? 's' : ''} loaded from memory`)
      } else {
        addLine('meta', '·', 'no prior memory — starting fresh')
      }
      break

    case 'step':
      addLine('step', '·', data.purpose)
      break

    case 'agenterror':
      addLine('fail', '⚠', data.message)
      break

    case 'complete':
      addLine('divider', '·', '─'.repeat(44))
      if (data.success) {
        addLine('ok', '✓', `complete in ${Math.round(data.durationMs / 1000)}s`)
      } else {
        addLine('fail', '✗', `failed after ${Math.round(data.durationMs / 1000)}s`)
      }
      if (data.hintsExtracted > 0) {
        addLine('record', '✦',
          `${data.hintsExtracted} new hint${data.hintsExtracted !== 1 ? 's' : ''} saved to memory (${data.hintsTotal} total)`)
      } else {
        addLine('meta', '·', 'no new hints extracted')
      }
      if (data.data) {
        const txt = typeof data.data === 'string'
          ? data.data
          : JSON.stringify(data.data, null, 2)
        addLine('divider', '·', '─'.repeat(44))
        addLine('data', ' ', txt.slice(0, 800) + (txt.length > 800 ? '\n…' : ''))
      }
      break

    case 'error':
      addLine('fail', '✗', data.message)
      break
  }
}

/* ── Output helpers ──────────────────────────────────────────────────── */
function clearOutput() {
  document.getElementById('output').innerHTML = ''
}

function addLine(cls, icon, text) {
  const out = document.getElementById('output')

  // remove empty placeholder
  const ph = out.querySelector('.empty-output')
  if (ph) ph.remove()

  const el = document.createElement('div')
  el.className = `line ${cls}`
  el.innerHTML = `
    <span class="line-icon">${icon}</span>
    <span class="line-text">${esc(text)}</span>
  `
  out.appendChild(el)
  out.scrollTop = out.scrollHeight
}

/* ── UI state ────────────────────────────────────────────────────────── */
function setUI(isRunning) {
  const btn = document.getElementById('run-btn')
  const dot = document.getElementById('dot')
  const txt = document.getElementById('status-txt')

  btn.disabled       = isRunning
  btn.textContent    = isRunning ? '⟳  RUNNING…' : '▶  RUN'
  dot.className      = isRunning ? 'dot running' : 'dot'
  txt.textContent    = isRunning ? 'running' : 'idle'
}

/* ── Utilities ───────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime()
  const s  = Math.floor(ms / 1000)
  const m  = Math.floor(s  / 60)
  const h  = Math.floor(m  / 60)
  const d  = Math.floor(h  / 24)
  if (d > 0) return `${d}d ago`
  if (h > 0) return `${h}h ago`
  if (m > 0) return `${m}m ago`
  return 'just now'
}
